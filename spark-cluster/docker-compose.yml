version: "3"

services:

  spark-master:
    image: spark:3.5.3
    container_name: spark-master
    working_dir: /opt/app
    command: >
      bash -c "
      /opt/spark/sbin/start-master.sh &&
      tail -f /dev/null
      "
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ..:/opt/app
      - ../spark-events:/opt/app/spark-events
      - ../spark-conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf

  spark-worker-1:
    image: spark:3.5.3
    container_name: spark-worker-1
    depends_on:
      - spark-master
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
      tail -f /dev/null
      "
    environment:
      - SPARK_WORKER_MEMORY=512m
      - SPARK_WORKER_CORES=1
    ports:
      - "8081:8081"
    volumes:
      - ..:/opt/app
      - ../spark-events:/opt/app/spark-events
      - ../spark-conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf

  spark-worker-2:
    image: spark:3.5.3
    container_name: spark-worker-2
    depends_on:
      - spark-master
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
      tail -f /dev/null
      "
    environment:
      - SPARK_WORKER_MEMORY=512m
      - SPARK_WORKER_CORES=1
    ports:
      - "8082:8081"
    volumes:
      - ..:/opt/app
      - ../spark-events:/opt/app/spark-events
      - ../spark-conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf

  spark-history:
    image: spark:3.5.3
    container_name: spark-history
    command: >
      bash -c "
      /opt/spark/sbin/start-history-server.sh \
      --properties-file /opt/spark/conf/spark-defaults.conf &&
      tail -f /dev/null
      "
    ports:
      - "18080:18080"
    volumes:
      - ../spark-events:/opt/app/spark-events
      - ../spark-conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf